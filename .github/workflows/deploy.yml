name: Deploy to GitHub Pages

on:
  # 当推送到 main 分支时触发
  push:
    branches: [main]
  # 允许手动在 Actions 页面点击运行
  workflow_dispatch:

# 设置权限，确保有权限写入 gh-pages 分支
permissions:
  contents: read
  pages: write
  id-token: write

# 允许只有一个并发部署任务，防止多次推送导致冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建项目 (生成 dist 文件夹)
      - name: Build
        run: npm run build

      # 5. 配置 Pages 环境 (自动处理域名、SSL等)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. 上传构建产物 (dist 文件夹)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 这里必须对应你 vite build 输出的目录，通常是 'dist'
          path: './dist'

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4